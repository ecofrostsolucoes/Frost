<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frost — Seu Parceiro de Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b24;
    --border: #21293a;
    --accent: #38bdf8;
    --accent2: #34d399;
    --warn: #fbbf24;
    --text: #e2e8f0;
    --dim: #4a6080;
    --red: #f87171;
    --frost: #7dd3fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Fundo animado sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(56,189,248,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 90%, rgba(52,211,153,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .frost-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8, #7dd3fc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 0 2px var(--border), 0 0 16px rgba(56,189,248,0.25);
    transition: box-shadow 0.3s;
    flex-shrink: 0;
  }

  .frost-avatar.awake {
    box-shadow: 0 0 0 2px var(--accent), 0 0 24px rgba(56,189,248,0.5);
    animation: avatarPulse 2s infinite;
  }

  .frost-avatar.speaking {
    box-shadow: 0 0 0 3px var(--accent2), 0 0 28px rgba(52,211,153,0.6);
    animation: speakPulse 0.5s infinite alternate;
  }

  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(56,189,248,0.4); }
    50% { box-shadow: 0 0 0 2px var(--accent), 0 0 28px rgba(56,189,248,0.7); }
  }

  @keyframes speakPulse {
    from { box-shadow: 0 0 0 2px var(--accent2), 0 0 12px rgba(52,211,153,0.4); }
    to { box-shadow: 0 0 0 4px var(--accent2), 0 0 32px rgba(52,211,153,0.8); }
  }

  .frost-info { flex: 1; min-width: 0; }

  .frost-name {
    font-size: 18px;
    font-weight: 900;
    color: var(--frost);
    letter-spacing: 0.5px;
  }

  .frost-status {
    font-size: 12px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.3s;
  }

  .frost-status.awake { color: var(--accent); }
  .frost-status.speaking { color: var(--accent2); }

  .wake-hint {
    font-size: 11px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    text-align: right;
    line-height: 1.4;
    flex-shrink: 0;
  }

  /* ===== CHAT ===== */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 88%;
    animation: msgIn 0.25s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.frost { align-self: flex-start; }

  .msg-av {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .msg.frost .msg-av {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    box-shadow: 0 0 8px rgba(56,189,248,0.3);
  }

  .msg.user .msg-av {
    background: linear-gradient(135deg, #065f46, #059669);
    box-shadow: 0 0 8px rgba(52,211,153,0.2);
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 100%;
    word-break: break-word;
  }

  .msg.frost .msg-bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid rgba(52,211,153,0.2);
    border-top-right-radius: 4px;
    color: #d1fae5;
  }

  /* Typing */
  .typing-wrap { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.1s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* ===== WAKE SCREEN ===== */
  .sleep-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .sleep-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0c2a3d, #1a4a6a);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    position: relative;
  }

  .sleep-rings {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(56,189,248,0.15);
    animation: ringPulse 3s infinite;
  }

  .sleep-rings:nth-child(2) {
    inset: -22px;
    border-color: rgba(56,189,248,0.08);
    animation-delay: 1s;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.5; }
  }

  .sleep-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--frost);
  }

  .sleep-sub {
    font-size: 14px;
    color: var(--dim);
    max-width: 260px;
    line-height: 1.6;
  }

  .wake-word-badge {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ===== CHIPS ===== */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 8px;
    position: relative;
    z-index: 1;
  }

  .chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
    user-select: none;
  }

  .chip:active {
    background: rgba(56,189,248,0.12);
    border-color: var(--accent);
    transform: scale(0.96);
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    padding: 10px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 9px 13px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    resize: none;
    outline: none;
    max-height: 80px;
    line-height: 1.4;
    display: block;
  }

  textarea::placeholder { color: var(--dim); font-weight: 400; }

  .mic-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
    user-select: none;
  }

  .mic-btn.listening {
    background: rgba(248,113,113,0.12);
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 0 4px rgba(248,113,113,0.15);
    animation: micRing 1s infinite;
  }

  @keyframes micRing {
    0%, 100% { box-shadow: 0 0 0 4px rgba(248,113,113,0.15); }
    50% { box-shadow: 0 0 0 8px rgba(248,113,113,0.05); }
  }

  .send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #0284c7);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 0 14px rgba(56,189,248,0.3);
  }

  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== STATUS BAR ===== */
  .status-bar {
    height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    transition: height 0.2s, padding 0.2s;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .status-bar.mic-active {
    height: 32px;
    padding: 6px 14px;
    background: rgba(248,113,113,0.07);
    border-top: 1px solid rgba(248,113,113,0.2);
    color: var(--red);
  }

  .status-bar.tts-active {
    height: 32px;
    padding: 6px 14px;
    background: rgba(56,189,248,0.06);
    border-top: 1px solid rgba(56,189,248,0.15);
    color: var(--accent);
  }

  .wave-bars {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 16px;
  }

  .wave-bar {
    width: 3px;
    background: currentColor;
    border-radius: 2px;
    animation: waveAnim 0.7s infinite ease-in-out;
  }

  .wave-bar:nth-child(1) { height: 6px; }
  .wave-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 8px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 14px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 5px; animation-delay: 0.4s; }

  @keyframes waveAnim {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* ===== MODAL CONFIG ===== */
  .gear-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: all 0.2s;
  }
  .gear-btn:active { color: var(--accent); border-color: var(--accent); }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.78); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
    width: 100%; max-width: 500px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); } to { transform: translateY(0); }
  }
  .modal-title { font-size: 18px; font-weight: 900; color: var(--frost); margin-bottom: 6px; }
  .modal-sub { font-size: 12px; color: var(--dim); margin-bottom: 20px; line-height: 1.5; }
  .modal-label {
    font-size: 12px; font-weight: 700; color: var(--accent);
    margin-bottom: 6px; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.5px;
    display: block;
  }
  .modal-input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    outline: none; margin-bottom: 16px; transition: border-color 0.2s;
    display: block;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-select {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600;
    outline: none; margin-bottom: 20px; cursor: pointer; display: block;
  }
  .modal-save {
    width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #0284c7);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer; margin-bottom: 10px; display: block;
  }
  .modal-cancel {
    width: 100%; padding: 10px; border: 1px solid var(--border);
    border-radius: 12px; background: transparent; color: var(--dim);
    font-family: 'Nunito', sans-serif; font-size: 14px; cursor: pointer; display: block;
  }
  .key-ok { background: rgba(52,211,153,0.1); color: var(--accent2); border: 1px solid rgba(52,211,153,0.2); border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: 'Share Tech Mono', monospace; margin-bottom: 16px; display: block; }
  .key-missing { background: rgba(251,191,36,0.1); color: var(--warn); border: 1px solid rgba(251,191,36,0.2); border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: 'Share Tech Mono', monospace; margin-bottom: 16px; display: block; }
</style>
</head>

  <div class="sleep-sub">Seu parceiro de campo em refrigeração. Me chama pelo nome pra eu acordar!</div>

    <textarea id="inputMsg" placeholder="Fala aí ou digita..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
// ===================== CONFIG =====================
const WAKE_WORDS = ['frost', 'fros', 'fróst', 'frostbot'];

const SYSTEM_PROMPT = `Você é o Frost, um amigo técnico de refrigeração com anos de experiência em campo. Você é descontraído, engraçado, fala como amigo de verdade — não como manual nem como atendente.

PERSONALIDADE:
- Fala naturalmente, como papo de amigo: "cara", "olha", "vê só", "bora", "saca", "tranquilo", "firmeza"
- Faz piadas leves quando a situação permite (nada forçado)
- Quando o problema é sério, fica focado mas continua amigável
- Pergunta de volta pra entender melhor — uma pergunta por vez
- Comemora quando resolve: "Aí sim!", "Isso aí!", "Era isso mesmo!"
- Reclama junto quando o equipamento dá trabalho: "Esse negócio é teimoso mesmo..."
- Usa frases curtas — você sabe que será lido em voz alta
- NUNCA começa resposta com "Claro!", "Ótimo!", "Entendido!" — fala direto

CONHECIMENTO TÉCNICO:
- Refrigeração comercial e industrial: câmaras frias, expositores, condensadores remotos
- Controladores: Carel, Dixell, Full Gauge, Danfoss — códigos de erro e parâmetros
- Cálculo de superaquecimento, sub-resfriamento, pressões de sucção e descarga
- Diagnóstico elétrico: sensores NTC/PTC, pressostatos, capacitores, relés, contactoras
- Diagnóstico mecânico: compressores, válvulas de expansão TXV e eletrônica, evaporadores
- Fluidos: R404A, R134a, R410A, R22, R290, R600a — tabelas de pressão x temperatura
- Problemas comuns de campo e suas causas mais prováveis

FORMATO DAS RESPOSTAS:
- Máximo 3-4 frases por mensagem (você fala em voz alta)
- Dê sempre um próximo passo concreto
- Se não tem info suficiente, pergunta primeiro
- Responda em português brasileiro informal`;

let history = [];
let awake = false;
let recognition = null;
let recognizing = false;
let isSpeaking = false;
let synth = window.speechSynthesis || null;
let wakeListen = null;
let wakeRecognizing = false;

// ===================== UI =====================
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendChip(text) {
  document.getElementById('inputMsg').value = text;
  sendMessage();
}

function setStatus(state, text) {
  const avatar = document.getElementById('frostAvatar');
  const status = document.getElementById('frostStatus');
  const bar = document.getElementById('statusBar');
  const barText = document.getElementById('statusText');

  avatar.className = 'frost-avatar' + (state !== 'sleep' ? ' ' + state : '');
  status.className = 'frost-status' + (state !== 'sleep' ? ' ' + state : '');
  status.textContent = text;

  bar.className = 'status-bar';
  if (state === 'mic') { bar.classList.add('mic-active'); barText.textContent = 'Ouvindo você...'; }
  else if (state === 'wake') { bar.classList.add('mic-active'); barText.textContent = 'Aguardando "Frost"...'; }
  else if (state === 'speaking') { bar.classList.add('tts-active'); barText.textContent = 'Frost está falando...'; }
}

function wakeUp() {
  if (awake) return;
  awake = true;

  document.getElementById('sleepScreen').style.display = 'none';
  document.getElementById('chatArea').style.display = 'flex';
  document.getElementById('chipsBar').style.display = 'flex';

  setStatus('awake', 'acordado e pronto!');

  // Saudações variadas
  const saudacoes = [
    'Opa, chamou? Tô aqui! O que tá rolando aí?',
    'Eae! Frost na área. Qual o problema hoje?',
    'Oi oi! Me chama que eu apareço. O que tá acontecendo aí?',
    'Fala! Tô de olho. Qual equipamento tá aprontando?',
    'Aqui ó! O que esse trem tá fazendo de errado?'
  ];
  const greeting = saudacoes[Math.floor(Math.random() * saudacoes.length)];

  addMsg('frost', greeting);
  history.push({ role: 'assistant', content: greeting });
  speak(greeting);
}

function addMsg(role, text) {
  const area = document.getElementById('chatArea');

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg frost';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-av">🧊</div>
    <div class="msg-bubble">
      <div class="typing-wrap">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ===================== API =====================
async function sendMessage() {
  const input = document.getElementById('inputMsg');
  const text = input.value.trim();
  if (!text) return;

  if (!awake) { wakeUp(); }

  stopSpeaking();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    // Extrair texto ignorando blocos de tool
    let reply = '';
    if (data.content && Array.isArray(data.content)) {
      reply = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join(' ')
        .trim();
    }
    if (!reply) reply = 'Ei, deu algum erro aqui. Tenta de novo!';

    history.push({ role: 'assistant', content: data.content || reply });
    addMsg('frost', reply);
    speak(reply);

  } catch (e) {
    removeTyping();
    const err = 'Cara, perdi o sinal aqui. Verifica a conexão e chama de novo!';
    addMsg('frost', err);
    speak(err);
  }

  document.getElementById('sendBtn').disabled = false;
}

// ===================== TTS OpenAI =====================
let OPENAI_KEY = localStorage.getItem('frost_openai_key') || '';
let currentAudio = null;

function cleanText(text) {
  return text
    .replace(/[\u{1F300}-\u{1FFFF}]/gu, '')
    .replace(/[🌡️💧⚡🔧📊❄️🧊👷]/g, '')
    .replace(/<[^>]*>/g, '')
    .trim();
}

async function speak(text) {
  stopSpeaking();
  const clean = cleanText(text);
  if (!clean) return;

  isSpeaking = true;
  setStatus('speaking', 'falando...');

  try {
    const res = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${OPENAI_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'tts-1',
        voice: localStorage.getItem('frost_voice') || 'echo',
        input: clean,
        speed: 1.0
      })
    });

    if (!res.ok) throw new Error('TTS error');

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);

    currentAudio.onended = () => {
      isSpeaking = false;
      URL.revokeObjectURL(url);
      setStatus('awake', 'acordado e pronto!');
      if (!recognizing) startWakeListener();
    };

    currentAudio.onerror = () => {
      isSpeaking = false;
      setStatus('awake', 'acordado e pronto!');
      if (!recognizing) startWakeListener();
    };

    await currentAudio.play();

  } catch (e) {
    // Fallback pro TTS nativo se OpenAI falhar
    isSpeaking = false;
    setStatus('awake', 'acordado e pronto!');
    if (synth) {
      const utter = new SpeechSynthesisUtterance(clean);
      utter.lang = 'pt-BR';
      synth.speak(utter);
    }
    if (!recognizing) startWakeListener();
  }
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  synth && synth.cancel();
  isSpeaking = false;
}

// ===================== STT WAKE WORD =====================
function startWakeListener() {
  if (awake) return; // Frost já acordado, não precisa
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR || wakeRecognizing) return;

  wakeListen = new SR();
  wakeListen.lang = 'pt-BR';
  wakeListen.continuous = false;
  wakeListen.interimResults = false;

  wakeListen.onstart = () => {
    wakeRecognizing = true;
    if (!awake) setStatus('wake', 'aguardando "Frost"...');
  };

  wakeListen.onresult = (e) => {
    const said = e.results[0][0].transcript.toLowerCase().trim();
    const triggered = WAKE_WORDS.some(w => said.includes(w));
    if (triggered) {
      wakeRecognizing = false;
      wakeUp();
      // Após acordar, começa a ouvir de verdade
      setTimeout(() => startListening(), 600);
    }
  };

  wakeListen.onend = () => {
    wakeRecognizing = false;
    // Reinicia se ainda não acordou
    if (!awake && !recognizing) {
      setTimeout(startWakeListener, 300);
    }
  };

  wakeListen.onerror = () => {
    wakeRecognizing = false;
    if (!awake) setTimeout(startWakeListener, 1000);
  };

  try { wakeListen.start(); } catch(e) {}
}

// ===================== STT CONVERSA =====================
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  if (recognizing) return;

  stopSpeaking();

  const rec = new SR();
  rec.lang = 'pt-BR';
  rec.continuous = false;
  rec.interimResults = false;
  recognition = rec;

  rec.onstart = () => {
    recognizing = true;
    document.getElementById('micBtn').classList.add('listening');
    setStatus('mic', 'ouvindo...');
  };

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    document.getElementById('inputMsg').value = text;
    sendMessage();
  };

  rec.onend = () => {
    recognizing = false;
    document.getElementById('micBtn').classList.remove('listening');
    if (awake && !isSpeaking) setStatus('awake', 'acordado e pronto!');
  };

  rec.onerror = (e) => {
    recognizing = false;
    document.getElementById('micBtn').classList.remove('listening');
    if (e.error === 'not-allowed') {
      addMsg('frost', 'Cara, precisa liberar o microfone nas configurações do navegador pra eu te ouvir!');
    }
  };

  try { rec.start(); } catch(e) {}
}

function toggleMic() {
  if (!awake) { wakeUp(); setTimeout(() => startListening(), 400); return; }
  if (recognizing) {
    recognition && recognition.stop();
  } else {
    startListening();
  }
}


// ===================== CONFIG MODAL =====================
function openConfig() {
  const key = localStorage.getItem('frost_openai_key') || '';
  const voice = localStorage.getItem('frost_voice') || 'echo';
  document.getElementById('cfgKey').value = key;
  document.getElementById('cfgVoice').value = voice;
  const statusEl = document.getElementById('keyStatus');
  if (key) {
    statusEl.className = 'key-ok';
    statusEl.textContent = '✅ Chave configurada — sk-proj-...' + key.slice(-6);
  } else {
    statusEl.className = 'key-missing';
    statusEl.textContent = '⚠️ Nenhuma chave configurada ainda';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeConfig() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeConfigOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeConfig();
}

function saveConfig() {
  const key = document.getElementById('cfgKey').value.trim();
  const voice = document.getElementById('cfgVoice').value;
  if (key) {
    localStorage.setItem('frost_openai_key', key);
    OPENAI_KEY = key;
  }
  localStorage.setItem('frost_voice', voice);
  closeConfig();
  // Feedback visual
  const statusEl = document.getElementById('frostStatus');
  statusEl.textContent = 'configurações salvas!';
  setTimeout(() => {
    if (awake) statusEl.textContent = 'acordado e pronto!';
    else statusEl.textContent = 'dormindo... chama aí';
  }, 2000);
}

// ===================== INIT =====================
if (synth) {
  synth.onvoiceschanged = () => synth.getVoices();
  synth.getVoices();
}

window.addEventListener('load', () => {
  setTimeout(startWakeListener, 1200);
});
</script>

<!-- Modal Config -->
<div class="modal-overlay" id="modalOverlay" onclick="closeConfigOutside(event)">
  <div class="modal">
    <div class="modal-title">⚙️ Configurações</div>
    <div class="modal-sub">Sua chave fica salva só no seu celular, ninguém mais tem acesso.</div>

    <span id="keyStatus"></span>

    <label class="modal-label">🔑 CHAVE OPENAI (sk-proj-...)</label>
    <input class="modal-input" type="password" id="cfgKey" placeholder="Cole sua chave aqui..." />

    <label class="modal-label">🎙️ VOZ DO FROST</label>
    <select class="modal-select" id="cfgVoice">
      <option value="echo">echo — natural e suave (recomendado)</option>
      <option value="onyx">onyx — grave e profissional</option>
      <option value="fable">fable — expressivo e animado</option>
      <option value="alloy">alloy — neutro e claro</option>
    </select>

    <button class="modal-save" onclick="saveConfig()">💾 Salvar</button>
    <button class="modal-cancel" onclick="closeConfig()">Cancelar</button>
  </div>
</div>
</body>
</html>
